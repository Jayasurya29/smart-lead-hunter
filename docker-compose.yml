# ============================================================
# SMART LEAD HUNTER — Docker Compose (Production)
# Fixes: AR4 (Flower monitoring), AR5 (app Dockerfile)
# Previous fixes included: M-17 (security hardening)
# ============================================================

services:
  # ─── PostgreSQL with pgvector ───
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart-lead-hunter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: smart_lead_hunter
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis for Celery ───
  redis:
    image: redis:7-alpine
    container_name: smart-lead-hunter-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Web Application ───
  app:
    build: .
    container_name: smart-lead-hunter-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_output:/app/output
      - app_logs:/app/logs

  # ─── Celery Worker ───
  worker:
    build: .
    container_name: smart-lead-hunter-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_output:/app/output
      - app_logs:/app/logs

  # ─── Celery Beat Scheduler ───
  beat:
    build: .
    container_name: smart-lead-hunter-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  # ─── AR4: Flower — Celery Monitoring Dashboard ───
  flower:
    build: .
    container_name: smart-lead-hunter-flower
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app flower
      --port=5555
      --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
      --broker-api=redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "127.0.0.1:5555:5555"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  app_output:
  app_logs:
