# Smart Lead Hunter - Docker Services
#
# M-17 FIX:
# 1. Redis bound to 127.0.0.1 (was 0.0.0.0:6379 — exposed to all interfaces)
# 2. Redis now requires password authentication via requirepass
# 3. Postgres password moved to env var (was hardcoded "Support1!")
# 4. Postgres also bound to 127.0.0.1
#
# SETUP: Copy .env.example to .env and set your passwords:
#   POSTGRES_PASSWORD=<your-secure-password>
#   REDIS_PASSWORD=<your-secure-password>

services:
  # PostgreSQL Database with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart-lead-hunter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # M-17: Password from env var instead of hardcoded
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: smart_lead_hunter
    ports:
      # M-17: Bind to localhost only — not accessible from other machines
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery task queue
  redis:
    image: redis:7-alpine
    container_name: smart-lead-hunter-redis
    restart: unless-stopped
    # M-17: Enable password authentication
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      # M-17: Bind to localhost only — was 0.0.0.0:6379 (world-accessible)
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
