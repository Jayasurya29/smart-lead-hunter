<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Lead Hunter{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand': {
                            50: '#f0f4f8', 100: '#d9e2ec', 200: '#bcccdc', 300: '#9fb3c8',
                            400: '#829ab1', 500: '#627d98', 600: '#486581',
                            700: '#334e68', 800: '#243b53', 900: '#102a43',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.10/dist/htmx.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-indicator { display: none; }
        .htmx-swapping { opacity: 0; transition: opacity 0.2s ease-out; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .lead-row { transition: all 0.15s ease; }
        .lead-row:hover { background-color: #f0f4f8; }
        .lead-row.active { background-color: #e2e8f0; border-left: 3px solid #334e68; }
        @keyframes slideIn { from { transform: translateX(12px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .slide-in { animation: slideIn 0.25s ease-out; }
        .tier-badge { font-size: 0.65rem; letter-spacing: 0.03em; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
        .tier-1 { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
        .tier-2 { background: #ede9fe; color: #5b21b6; border: 1px solid #c4b5fd; }
        .tier-3 { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        .tier-4 { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .score-hot { background: linear-gradient(135deg, #fef2f2, #fee2e2); border: 2px solid #fca5a5; color: #dc2626; }
        .score-warm { background: linear-gradient(135deg, #fff7ed, #ffedd5); border: 2px solid #fdba74; color: #ea580c; }
        .score-cold { background: #f1f5f9; border: 2px solid #e2e8f0; color: #64748b; }
        .insight-list li { position: relative; padding-left: 1.25rem; margin-bottom: 0.35rem; line-height: 1.5; }
        .insight-list li::before { content: ''; position: absolute; left: 0; top: 0.55em; width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.3s ease-out; }
        /* ── Dynamic hover action buttons ── */
        .row-actions {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%) translateX(4px);
            display: flex;
            align-items: center;
            gap: 2px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(4px);
            box-shadow: 0 1px 6px rgba(0,0,0,0.12);
            border-radius: 8px;
            padding: 3px 6px;
            border: 1px solid #e5e7eb;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
        }
        .lead-row:hover .row-actions {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
            pointer-events: auto;
        }
    </style>
</head>
<body class="h-full" hx-headers='{"X-API-Key": "{{ api_auth_key|default("", true) }}"}'>
    <!-- C-04: API key available for JS fetch() calls -->
    <meta name="api-key" content="{{ api_auth_key|default('', true) }}">
    <script>
        // C-04: Auto-inject X-API-Key header into all fetch() calls
        (function() {
            const apiKey = document.querySelector('meta[name="api-key"]')?.content;
            if (apiKey) {
                const _origFetch = window.fetch;
                window.fetch = function(url, opts = {}) {
                    opts.headers = opts.headers || {};
                    if (opts.headers instanceof Headers) {
                        if (!opts.headers.has('X-API-Key')) opts.headers.set('X-API-Key', apiKey);
                    } else {
                        opts.headers['X-API-Key'] = opts.headers['X-API-Key'] || apiKey;
                    }
                    return _origFetch.call(this, url, opts);
                };
            }
        })();
    </script>
    <div class="min-h-full">
        <!-- ═══ NAVBAR — White, 80px, logo fills height ═══ -->
        <nav class="bg-white border-b border-gray-200 shadow-sm h-[80px] flex-shrink-0">
            <div class="w-full h-full px-10 lg:px-16 flex items-center justify-between">

                <!-- LEFT: Logo + Brand Name -->
                <a href="/dashboard" class="flex items-center gap-10 h-full py-0 flex-shrink-0">
                    <img src="/static/img/logo.svg" alt="JA Uniforms"
                         class="h-full w-auto object-contain py-2"
                         style="min-width: 100px;">
                    <span class="text-xl font-bold text-brand-900 tracking-tight ml-12">Smart Lead Hunter</span>
                </a>

                <!-- CENTER: Navigation Links -->
                <div class="flex items-center gap-1.5">
                    <a href="/dashboard?tab=pipeline"
                       class="px-5 py-2.5 rounded-lg text-base font-semibold transition-all {% if not request.query_params.get('score') and not request.query_params.get('location') %}bg-brand-900 text-white shadow-sm{% else %}text-gray-500 hover:bg-gray-100 hover:text-gray-900{% endif %}">
                        📊 Dashboard
                    </a>
                    <a href="/dashboard?tab=pipeline&score=hot"
                       class="px-5 py-2.5 rounded-lg text-base font-semibold transition-all {% if request.query_params.get('score') == 'hot' %}bg-red-500 text-white shadow{% else %}text-gray-500 hover:bg-gray-100 hover:text-gray-900{% endif %}">
                        🔥 Hot
                    </a>
                    <a href="/dashboard?tab=pipeline&location=florida"
                       class="px-5 py-2.5 rounded-lg text-base font-semibold transition-all {% if request.query_params.get('location') == 'florida' %}bg-emerald-500 text-white shadow{% else %}text-gray-500 hover:bg-gray-100 hover:text-gray-900{% endif %}">
                        🌴 Florida
                    </a>
                    <a href="/dashboard?tab=pipeline&location=caribbean"
                       class="px-5 py-2.5 rounded-lg text-base font-semibold transition-all {% if request.query_params.get('location') == 'caribbean' %}bg-cyan-500 text-white shadow{% else %}text-gray-500 hover:bg-gray-100 hover:text-gray-900{% endif %}">
                        🏝️ Caribbean
                    </a>
                </div>

                <!-- RIGHT: Action Buttons -->
                <div class="flex items-center gap-2.5 flex-shrink-0">
                    <button onclick="window.dispatchEvent(new CustomEvent('open-scrape-modal'))"
                            class="inline-flex items-center gap-2 px-5 py-2.5 bg-emerald-600 text-white text-sm font-semibold rounded-lg hover:bg-emerald-500 transition-colors shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        Run Scrape
                    </button>
                    <button onclick="window.dispatchEvent(new CustomEvent('open-discovery-modal'))"
                            class="inline-flex items-center gap-2 px-5 py-2.5 bg-brand-700 text-white text-sm font-semibold rounded-lg hover:bg-brand-600 transition-colors shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/>
                        </svg>
                        Discovery
                    </button>
                </div>
            </div>
        </nav>
        <main class="py-4">{% block content %}{% endblock %}</main>
    </div>
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const colors = { success: 'bg-emerald-600', error: 'bg-red-600', info: 'bg-brand-700', warning: 'bg-amber-500' };
            const toast = document.createElement('div');
            toast.className = `${colors[type]} text-white px-5 py-3 rounded-lg shadow-lg text-sm font-medium transform transition-all duration-300 fade-up`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-2'); setTimeout(() => toast.remove(), 300); }, 3000);
        }
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            const toast = evt.detail.xhr.getResponseHeader('HX-Trigger');
            if (toast) { try { const data = JSON.parse(toast); if (data.showToast) showToast(data.showToast.message, data.showToast.type); } catch (e) {} }
            if (evt.detail.target && evt.detail.target.id !== 'detail-panel') { Alpine.initTree(evt.detail.target); }
        });
    </script>
    <script>
    document.body.addEventListener('htmx:responseError', function(e) {
        if (e.detail.target && e.detail.target.id === 'stats-container') {
            setTimeout(function() { htmx.trigger(e.detail.target, 'load'); }, 2000);
        }
    });
    document.body.addEventListener('htmx:timeout', function(e) {
        if (e.detail.target && e.detail.target.id === 'stats-container') {
            setTimeout(function() { htmx.trigger(e.detail.target, 'load'); }, 2000);
        }
    });
    </script>
    <script>
    function leadDetail(leadId) {
        return {
            tab: 'overview',
            saving: false, saveMsg: '', saveError: false,
            enriching: false, enrichMsg: '',
            contacts: [], contactsLoading: false, contactsLoaded: false,

            init() { this.loadContacts(); },

            async loadContacts() {
                if (this.contactsLoaded) return;
                this.contactsLoading = true;
                try {
                    const resp = await fetch(`/api/dashboard/leads/${leadId}/contacts`, { credentials: 'same-origin' });
                    if (resp.ok) { this.contacts = await resp.json(); }
                } catch (e) { console.error('Contact load failed:', e); }
                this.contactsLoading = false;
                this.contactsLoaded = true;
            },

            enrichProgress: 0, enrichStage: '',
            async enrichLead() {
                if (this.enriching) return;
                this.enriching = true; this.enrichMsg = ''; this.enrichProgress = 0; this.enrichStage = '';
                const stages = [
                    { pct: 5, msg: 'Starting enrichment...' },
                    { pct: 15, msg: 'Searching web articles...' },
                    { pct: 30, msg: 'Scanning press releases...' },
                    { pct: 45, msg: 'Extracting LinkedIn profiles...' },
                    { pct: 60, msg: 'Running targeted title searches...' },
                    { pct: 75, msg: 'Verifying contacts with AI...' },
                    { pct: 85, msg: 'Checking Apollo database...' },
                    { pct: 92, msg: 'Finding LinkedIn URLs...' },
                    { pct: 96, msg: 'Finalizing results...' },
                ];
                let stageIdx = 0;
                const progressTimer = setInterval(() => {
                    if (stageIdx < stages.length) {
                        this.enrichProgress = stages[stageIdx].pct;
                        this.enrichStage = stages[stageIdx].msg;
                        stageIdx++;
                    }
                }, 4000);
                try {
                    const resp = await fetch(`/api/dashboard/leads/${leadId}/enrich`, {
                        method: 'POST', credentials: 'same-origin',
                        headers: { 'X-Requested-With': 'XMLHttpRequest' }
                    });
                    clearInterval(progressTimer);
                    const data = await resp.json();
                    this.enrichProgress = 100; this.enrichStage = '';
                    this.enriching = false;
                    if (data.contacts_found > 0) {
                        this.enrichMsg = 'Found ' + data.contacts_found + ' contact(s)!';
                        this.tab = 'contact';
                        this.contactsLoaded = false;
                        await this.loadContacts();
                    } else if (data.updated_fields && data.updated_fields.length > 0) {
                        this.enrichMsg = 'Updated ' + data.updated_fields.length + ' field(s)';
                        this.contactsLoaded = false;
                        await this.loadContacts();
                    } else { this.enrichMsg = 'No contacts found'; }
                } catch (e) { clearInterval(progressTimer); this.enriching = false; this.enrichProgress = 0; this.enrichMsg = 'Error: ' + e.message; }
            },

            async saveContact(contactId) {
                try {
                    const resp = await fetch(`/api/dashboard/leads/${leadId}/contacts/${contactId}/save`, { method: 'POST', credentials: 'same-origin' });
                    if (resp.ok) { const c = this.contacts.find(x => x.id === contactId); if (c) c.is_saved = true; }
                } catch (e) { console.error(e); }
            },

            async unsaveContact(contactId) {
                try {
                    const resp = await fetch(`/api/dashboard/leads/${leadId}/contacts/${contactId}/unsave`, { method: 'POST', credentials: 'same-origin' });
                    if (resp.ok) { const c = this.contacts.find(x => x.id === contactId); if (c) c.is_saved = false; }
                } catch (e) { console.error(e); }
            },

            async setPrimary(contactId) {
                try {
                    const resp = await fetch(`/api/dashboard/leads/${leadId}/contacts/${contactId}/set-primary`, { method: 'POST', credentials: 'same-origin' });
                    if (resp.ok) { this.contacts.forEach(c => { c.is_primary = (c.id === contactId); if (c.id === contactId) c.is_saved = true; }); }
                } catch (e) { console.error(e); }
            },

            async deleteContact(contactId, name) {
                if (!confirm(`Remove ${name}?`)) return;
                try {
                    const resp = await fetch(`/api/dashboard/leads/${leadId}/contacts/${contactId}`, { method: 'DELETE', credentials: 'same-origin', headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                    if (resp.ok) { this.contacts = this.contacts.filter(c => c.id !== contactId); }
                } catch (e) { console.error(e); }
            },

            async saveLead() {
                this.saving = true; this.saveMsg = '';
                const form = document.getElementById('lead-edit-form');
                const formData = new FormData(form);
                const data = {};
                for (const [k, v] of formData.entries()) { data[k] = k === 'room_count' ? (v ? parseInt(v) : null) : (v || null); }
                try {
                    const resp = await fetch(`/api/dashboard/leads/${leadId}/edit`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                    if (resp.ok) { this.saveMsg = 'Saved!'; this.saveError = false; this.tab = 'overview'; htmx.ajax('GET', `/api/dashboard/leads/${leadId}/row`, { target: `#lead-row-${leadId}`, swap: 'outerHTML' }); }
                    else { const err = await resp.json(); this.saveMsg = err.detail || 'Save failed'; this.saveError = true; }
                } catch (e) { this.saveMsg = 'Network error'; this.saveError = true; }
                this.saving = false;
                setTimeout(() => { this.saveMsg = ''; }, 3000);
            }
        }
    }
    </script>
</body>
</html>
