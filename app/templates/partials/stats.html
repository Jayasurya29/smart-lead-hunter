<!-- Stats Header with Actions -->
<div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold text-gray-900">Dashboard Overview</h2>
    <button @click="$dispatch('open-scrape-modal')"
            class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
        <svg class="-ml-1 mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Run Scrape Now
    </button>
</div>

<!-- Stats Cards Grid -->
<div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-6">
    <!-- Total Leads -->
    <div class="bg-white overflow-hidden shadow rounded-lg">
        <div class="p-4">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <svg class="h-6 w-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                </div>
                <div class="ml-4 w-0 flex-1">
                    <dl>
                        <dt class="truncate text-xs font-medium text-gray-500">Total Leads</dt>
                        <dd class="text-xl font-semibold text-gray-900">{{ stats.total_leads }}</dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>

    <!-- Hot Leads -->
    <div class="bg-white overflow-hidden shadow rounded-lg border-l-4 border-red-500">
        <div class="p-4">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <svg class="h-6 w-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/>
                    </svg>
                </div>
                <div class="ml-4 w-0 flex-1">
                    <dl>
                        <dt class="truncate text-xs font-medium text-gray-500">Hot (70+)</dt>
                        <dd class="text-xl font-semibold text-red-600">{{ stats.hot_leads }}</dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>

    <!-- Warm Leads -->
    <div class="bg-white overflow-hidden shadow rounded-lg border-l-4 border-orange-500">
        <div class="p-4">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <svg class="h-6 w-6 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <div class="ml-4 w-0 flex-1">
                    <dl>
                        <dt class="truncate text-xs font-medium text-gray-500">Warm (50-69)</dt>
                        <dd class="text-xl font-semibold text-orange-600">{{ stats.warm_leads }}</dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>

    <!-- New Leads -->
    <div class="bg-white overflow-hidden shadow rounded-lg border-l-4 border-blue-500">
        <div class="p-4">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <svg class="h-6 w-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                    </svg>
                </div>
                <div class="ml-4 w-0 flex-1">
                    <dl>
                        <dt class="truncate text-xs font-medium text-gray-500">New</dt>
                        <dd class="text-xl font-semibold text-blue-600">{{ stats.new_leads }}</dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>

    <!-- Approved -->
    <div class="bg-white overflow-hidden shadow rounded-lg border-l-4 border-green-500">
        <div class="p-4">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <svg class="h-6 w-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div class="ml-4 w-0 flex-1">
                    <dl>
                        <dt class="truncate text-xs font-medium text-gray-500">Approved</dt>
                        <dd class="text-xl font-semibold text-green-600">{{ stats.approved_leads }}</dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>

    <!-- This Week -->
    <div class="bg-white overflow-hidden shadow rounded-lg">
        <div class="p-4">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <svg class="h-6 w-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="ml-4 w-0 flex-1">
                    <dl>
                        <dt class="truncate text-xs font-medium text-gray-500">This Week</dt>
                        <dd class="text-xl font-semibold text-gray-900">{{ stats.leads_this_week }}</dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>
</div>
