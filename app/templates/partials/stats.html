<div class="px-10 lg:px-16">
    <div class="grid grid-cols-4 gap-3 sm:grid-cols-8">
        <a href="/dashboard?tab=pipeline" class="bg-white rounded-lg border border-gray-200 shadow-sm p-3 block hover:shadow-md transition-shadow text-center">
            <div class="text-2xl font-bold text-gray-900 leading-none">{{ stats.total_leads }}</div>
            <div class="text-xs text-gray-500 mt-1">Total</div>
        </a>
        <a href="/dashboard?tab=pipeline&score=hot" class="bg-white rounded-lg border border-red-200 shadow-sm p-3 block hover:shadow-md transition-shadow text-center">
            <div class="text-2xl font-bold text-red-600 leading-none">{{ stats.hot_leads }}</div>
            <div class="text-xs text-gray-500 mt-1">🔥 Hot</div>
        </a>
        <a href="/dashboard?tab=pipeline&score=urgent" class="bg-white rounded-lg border border-orange-200 shadow-sm p-3 block hover:shadow-md transition-shadow text-center">
            <div class="text-2xl font-bold text-orange-600 leading-none">{{ stats.urgent_leads }}</div>
            <div class="text-xs text-gray-500 mt-1">⚡ Urgent</div>
        </a>
        <a href="/dashboard?tab=pipeline&score=warm" class="bg-white rounded-lg border border-amber-200 shadow-sm p-3 block hover:shadow-md transition-shadow text-center">
            <div class="text-2xl font-bold text-amber-600 leading-none">{{ stats.warm_leads }}</div>
            <div class="text-xs text-gray-500 mt-1">🌡️ Warm</div>
        </a>
        <a href="/dashboard?tab=pipeline&score=cool" class="bg-white rounded-lg border border-blue-200 shadow-sm p-3 block hover:shadow-md transition-shadow text-center">
            <div class="text-2xl font-bold text-blue-500 leading-none">{{ stats.cool_leads }}</div>
            <div class="text-xs text-gray-500 mt-1">❄️ Cool</div>
        </a>
        <a href="/dashboard?tab=pipeline&sort=newest" class="bg-white rounded-lg border border-indigo-200 shadow-sm p-3 block hover:shadow-md transition-shadow text-center">
            <div class="text-2xl font-bold text-indigo-600 leading-none">{{ stats.new_leads }}</div>
            <div class="text-xs text-gray-500 mt-1">📥 New</div>
        </a>
        <a href="/dashboard?tab=approved" class="bg-white rounded-lg border border-emerald-200 shadow-sm p-3 block hover:shadow-md transition-shadow text-center">
            <div class="text-2xl font-bold text-emerald-600 leading-none">{{ stats.approved_leads }}</div>
            <div class="text-xs text-gray-500 mt-1">✅ Approved</div>
        </a>
        <a href="/dashboard?tab=deleted" class="bg-white rounded-lg border border-gray-200 shadow-sm p-3 block hover:shadow-md transition-shadow text-center">
            <div class="text-2xl font-bold text-gray-400 leading-none">{{ stats.deleted_leads|default(0) }}</div>
            <div class="text-xs text-gray-500 mt-1">🗑️ Deleted</div>
        </a>
    </div>
</div>
