<!-- Discovery Modal — Web Discovery Engine -->
<div x-data="discoveryModal()" x-cloak
     @open-discovery-modal.window="open()"
     @keydown.escape.window="if(show && !running) close()">

    <!-- Backdrop -->
    <div x-show="show" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50" @click="if(!running) close()"></div>

    <!-- Modal Panel -->
    <div x-show="show" x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
         class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col" @click.stop>

            <!-- Header -->
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between flex-shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center">
                        <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-gray-900">Web Discovery Engine</h3>
                        <p class="text-xs text-gray-500">Search the web for new hotel news sources &amp; leads</p>
                    </div>
                </div>
                <button @click="if(!running) close()" class="p-2 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors"
                        :class="running ? 'opacity-30 cursor-not-allowed' : ''">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Config Section (before run) -->
            <div x-show="!running && !completed" class="px-6 py-5 space-y-4 flex-shrink-0">
                <!-- Mode -->
                <div>
                    <label class="text-sm font-semibold text-gray-700 mb-2 block">Discovery Mode</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="relative cursor-pointer">
                            <input type="radio" x-model="mode" value="full" class="sr-only peer">
                            <div class="p-3 rounded-xl border-2 peer-checked:border-indigo-500 peer-checked:bg-indigo-50 border-gray-200 hover:border-gray-300 transition-all">
                                <div class="font-semibold text-sm text-gray-800">🌐 Full Discovery</div>
                                <div class="text-xs text-gray-500 mt-0.5">All queries, all engines</div>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" x-model="mode" value="quick" class="sr-only peer">
                            <div class="p-3 rounded-xl border-2 peer-checked:border-indigo-500 peer-checked:bg-indigo-50 border-gray-200 hover:border-gray-300 transition-all">
                                <div class="font-semibold text-sm text-gray-800">⚡ Quick Scan</div>
                                <div class="text-xs text-gray-500 mt-0.5">5 queries, faster results</div>
                            </div>
                        </label>
                    </div>
                </div>
                <!-- Options -->
                <div class="flex items-center gap-6">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" x-model="extractLeads" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm text-gray-700">Extract leads from discovered pages</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" x-model="dryRun" class="rounded border-gray-300 text-amber-600 focus:ring-amber-500">
                        <span class="text-sm text-gray-700">Dry run (preview only)</span>
                    </label>
                </div>
            </div>

            <!-- Progress Section -->
            <div x-show="running || completed" class="flex-1 overflow-hidden flex flex-col min-h-0">
                <!-- Status bar -->
                <div class="px-6 py-3 border-b border-gray-100 flex items-center justify-between flex-shrink-0"
                     :class="completed ? (hasErrors ? 'bg-amber-50' : 'bg-emerald-50') : 'bg-indigo-50'">
                    <div class="flex items-center gap-2">
                        <template x-if="running && !completed">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-indigo-600 animate-spin" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                </svg>
                                <span class="text-sm font-semibold text-indigo-700" x-text="statusText"></span>
                            </div>
                        </template>
                        <template x-if="completed">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-semibold" :class="hasErrors ? 'text-amber-700' : 'text-emerald-700'"
                                      x-text="hasErrors ? '⚠️ Completed with warnings' : '✅ Discovery Complete'"></span>
                            </div>
                        </template>
                    </div>
                    <div class="flex items-center gap-4 text-xs">
                        <span class="text-gray-500" x-show="stats.queries > 0">📡 <span x-text="stats.queries"></span> queries</span>
                        <span class="text-gray-500" x-show="stats.domains > 0">🌐 <span x-text="stats.domains"></span> domains</span>
                        <span class="text-emerald-600 font-semibold" x-show="stats.sources > 0">✨ <span x-text="stats.sources"></span> sources</span>
                        <span class="text-blue-600 font-semibold" x-show="stats.leads > 0">🏨 <span x-text="stats.leads"></span> leads</span>
                        <span class="text-gray-400" x-show="duration > 0" x-text="Math.round(duration) + 's'"></span>
                    </div>
                </div>

                <!-- Log messages -->
                <div class="flex-1 overflow-y-auto px-6 py-3 space-y-1 font-mono text-xs" id="discovery-log"
                     x-ref="logContainer">
                    <template x-for="msg in logMessages" :key="msg.id">
                        <div class="py-0.5" :class="{
                                 'text-gray-600': msg.type === 'info',
                                 'text-emerald-600 font-semibold': msg.type === 'success',
                                 'text-red-500': msg.type === 'error',
                                 'text-indigo-600': msg.type === 'phase',
                                 'text-amber-600': msg.type === 'warning',
                             }" x-text="msg.text"></div>
                    </template>
                </div>
            </div>

            <!-- Footer -->
            <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between flex-shrink-0">
                <div x-show="!running && !completed">
                    <span class="text-xs text-gray-400">Searches DuckDuckGo + Google News for hotel sources</span>
                </div>
                <div x-show="completed" class="text-xs text-gray-500">
                    <span x-show="stats.sources > 0">✅ <span x-text="stats.sources"></span> new sources added</span>
                    <span x-show="stats.leads > 0"> · 🏨 <span x-text="stats.leads"></span> leads found</span>
                </div>
                <div class="flex items-center gap-2">
                    <button x-show="!running" @click="close()"
                            class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-800 rounded-lg hover:bg-gray-100 transition-colors">
                        <span x-text="completed ? 'Close' : 'Cancel'"></span>
                    </button>
                    <button x-show="!running && !completed" @click="startDiscovery()"
                            class="px-5 py-2.5 text-sm font-semibold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 shadow-sm transition-all flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        Run Discovery
                    </button>
                    <button x-show="completed" @click="resetAndClose()"
                            class="px-5 py-2.5 text-sm font-semibold text-white bg-brand-800 rounded-lg hover:bg-brand-900 shadow-sm transition-all">
                        Done — Refresh Dashboard
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function discoveryModal() {
    return {
        show: false,
        running: false,
        completed: false,
        hasErrors: false,
        mode: 'full',
        extractLeads: true,
        dryRun: false,
        statusText: '',
        duration: 0,
        logMessages: [],
        stats: { queries: 0, domains: 0, sources: 0, leads: 0 },
        eventSource: null,
        msgCounter: 0,

        open() {
            this.show = true;
            this.running = false;
            this.completed = false;
            this.hasErrors = false;
            this.logMessages = [];
            this.stats = { queries: 0, domains: 0, sources: 0, leads: 0 };
            this.statusText = '';
            this.duration = 0;
            this.msgCounter = 0;
        },

        close() {
            if (this.running) return;
            if (this.eventSource) {
                this.eventSource.close();
                this.eventSource = null;
            }
            this.show = false;
        },

        resetAndClose() {
            this.show = false;
            if (this.eventSource) {
                this.eventSource.close();
                this.eventSource = null;
            }
            // Refresh the dashboard
            window.location.reload();
        },

        addLog(type, text) {
            this.msgCounter++;
            this.logMessages.push({ id: this.msgCounter, type, text });
            // Auto-scroll to bottom
            this.$nextTick(() => {
                if (this.$refs.logContainer) {
                    this.$refs.logContainer.scrollTop = this.$refs.logContainer.scrollHeight;
                }
            });
        },

        async startDiscovery() {
            this.running = true;
            this.completed = false;
            this.hasErrors = false;
            this.logMessages = [];
            this.stats = { queries: 0, domains: 0, sources: 0, leads: 0 };
            this.statusText = 'Starting discovery...';

            // 1. Trigger the discovery run
            try {
                const resp = await fetch('/api/dashboard/discovery/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mode: this.mode,
                        extract_leads: this.extractLeads,
                        dry_run: this.dryRun,
                    }),
                });
                const data = await resp.json();
                this._discoveryId = data.discovery_id || '';
                if (data.status === 'error') {
                    this.addLog('error', '❌ ' + data.message);
                    this.running = false;
                    this.hasErrors = true;
                    return;
                }
            } catch (e) {
                this.addLog('error', '❌ Failed to start: ' + e.message);
                this.running = false;
                this.hasErrors = true;
                return;
            }

            // 2. Connect to SSE stream
            const startTime = Date.now();
            this.eventSource = new EventSource('/api/dashboard/discovery/stream?discovery_id=' + this._discoveryId);

            this.eventSource.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    this.duration = (Date.now() - startTime) / 1000;

                    if (msg.type === 'complete') {
                        this.completed = true;
                        this.running = false;
                        if (msg.stats) this.stats = { ...this.stats, ...msg.stats };
                        this.statusText = 'Complete!';
                        this.addLog('success', msg.message || '✅ Discovery finished');
                        this.eventSource.close();
                        this.eventSource = null;
                        return;
                    }

                    if (msg.type === 'error') {
                        this.hasErrors = true;
                        this.addLog('error', msg.message);
                        return;
                    }

                    if (msg.type === 'stats') {
                        if (msg.queries !== undefined) this.stats.queries = msg.queries;
                        if (msg.domains !== undefined) this.stats.domains = msg.domains;
                        if (msg.sources !== undefined) this.stats.sources = msg.sources;
                        if (msg.leads !== undefined) this.stats.leads = msg.leads;
                        return;
                    }

                    // Regular log messages
                    this.addLog(msg.type || 'info', msg.message || JSON.stringify(msg));
                    if (msg.message) this.statusText = msg.message;

                } catch (e) {
                    this.addLog('info', event.data);
                }
            };

            this.eventSource.onerror = () => {
                if (!this.completed) {
                    this.duration = (Date.now() - startTime) / 1000;
                    this.hasErrors = true;
                    this.completed = true;
                    this.running = false;
                    this.addLog('error', '❌ Connection lost');
                }
                if (this.eventSource) {
                    this.eventSource.close();
                    this.eventSource = null;
                }
            };
        },
    };
}
</script>
