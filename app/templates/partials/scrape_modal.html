<!-- Smart Scrape Modal with Source Selection + URL Extract -->
<div id="scrape-modal"
     class="fixed inset-0 z-50 hidden"
     x-data="scrapeController()"
     @open-scrape-modal.window="openModal()"
     @open-url-extract.window="openUrlExtract($event.detail)">
    
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-gray-900 bg-opacity-60 backdrop-blur-sm" @click="closeModal()"></div>
    
    <!-- Modal -->
    <div class="absolute inset-0 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl overflow-hidden max-h-[90vh] flex flex-col" @click.stop>
            
            <!-- ============ SETUP VIEW (source selection) ============ -->
            <template x-if="view === 'setup'">
                <div class="flex flex-col max-h-[90vh]">
                    <!-- Header -->
                    <div class="px-6 py-4 border-b border-gray-200 bg-gradient-to-r from-blue-50 to-indigo-50">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-lg font-bold text-gray-900">🚀 Run Scrape Pipeline</h3>
                                <p class="text-sm text-gray-500">Choose scrape mode and sources</p>
                            </div>
                            <button @click="closeModal()" class="text-gray-400 hover:text-gray-600 p-1">
                                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Mode Selection — NOW 4 COLUMNS -->
                    <div class="px-6 py-4 border-b border-gray-100">
                        <div class="grid grid-cols-4 gap-3">
                            <button @click="scrapeMode = 'smart'"
                                    class="p-3 rounded-lg border-2 text-left transition-all"
                                    :class="scrapeMode === 'smart' ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-300'">
                                <div class="text-sm font-bold" :class="scrapeMode === 'smart' ? 'text-blue-700' : 'text-gray-700'">⚡ Smart</div>
                                <div class="text-xs text-gray-500 mt-1">Only due sources</div>
                                <div class="text-xs font-medium mt-1" :class="scrapeMode === 'smart' ? 'text-blue-600' : 'text-gray-400'" x-text="dueSources.length + ' due'"></div>
                            </button>
                            <button @click="scrapeMode = 'manual'"
                                    class="p-3 rounded-lg border-2 text-left transition-all"
                                    :class="scrapeMode === 'manual' ? 'border-purple-500 bg-purple-50' : 'border-gray-200 hover:border-gray-300'">
                                <div class="text-sm font-bold" :class="scrapeMode === 'manual' ? 'text-purple-700' : 'text-gray-700'">🎯 Manual</div>
                                <div class="text-xs text-gray-500 mt-1">Pick sources</div>
                                <div class="text-xs font-medium mt-1" :class="scrapeMode === 'manual' ? 'text-purple-600' : 'text-gray-400'" x-text="selectedSources.length + ' selected'"></div>
                            </button>
                            <button @click="scrapeMode = 'full'"
                                    class="p-3 rounded-lg border-2 text-left transition-all"
                                    :class="scrapeMode === 'full' ? 'border-amber-500 bg-amber-50' : 'border-gray-200 hover:border-gray-300'">
                                <div class="text-sm font-bold" :class="scrapeMode === 'full' ? 'text-amber-700' : 'text-gray-700'">🔄 Full Sweep</div>
                                <div class="text-xs text-gray-500 mt-1">All sources</div>
                                <div class="text-xs font-medium mt-1" :class="scrapeMode === 'full' ? 'text-amber-600' : 'text-gray-400'" x-text="allSources.length + ' sources'"></div>
                            </button>
                            <!-- NEW: URL Extract mode -->
                            <button @click="scrapeMode = 'url'"
                                    class="p-3 rounded-lg border-2 text-left transition-all"
                                    :class="scrapeMode === 'url' ? 'border-emerald-500 bg-emerald-50' : 'border-gray-200 hover:border-gray-300'">
                                <div class="text-sm font-bold" :class="scrapeMode === 'url' ? 'text-emerald-700' : 'text-gray-700'">🔗 URL Extract</div>
                                <div class="text-xs text-gray-500 mt-1">Paste any URL</div>
                                <div class="text-xs font-medium mt-1" :class="scrapeMode === 'url' ? 'text-emerald-600' : 'text-gray-400'">Direct extract</div>
                            </button>
                        </div>
                    </div>

                    <!-- Source List (Manual mode) -->
                    <div class="flex-1 overflow-y-auto px-6 py-3" x-show="scrapeMode === 'manual'" style="max-height: 400px;">
                        <!-- Category toggles -->
                        <div class="flex flex-wrap gap-2 mb-3">
                            <template x-for="cat in categories" :key="cat.type">
                                <button @click="toggleCategory(cat.type)"
                                        class="px-3 py-1 rounded-full text-xs font-medium transition-colors"
                                        :class="isCategorySelected(cat.type) ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'">
                                    <span x-text="cat.label"></span>
                                    <span class="ml-1 opacity-70" x-text="'(' + cat.count + ')'"></span>
                                </button>
                            </template>
                            <button @click="selectedSources = allSources.map(s => s.id)"
                                    class="px-3 py-1 rounded-full text-xs font-medium bg-gray-800 text-white hover:bg-gray-700">
                                Select All
                            </button>
                            <button @click="selectedSources = []"
                                    class="px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">
                                Clear
                            </button>
                        </div>
                        
                        <!-- Source checkboxes -->
                        <div class="space-y-1">
                            <template x-for="src in allSources" :key="src.id">
                                <label class="flex items-center p-2 rounded-lg hover:bg-gray-50 cursor-pointer group">
                                    <input type="checkbox" :value="src.id" 
                                           :checked="selectedSources.includes(src.id)"
                                           @change="toggleSource(src.id)"
                                           class="h-4 w-4 text-indigo-600 rounded border-gray-300">
                                    <div class="ml-3 flex-1 min-w-0">
                                        <div class="flex items-center">
                                            <span class="text-sm font-medium text-gray-700 truncate" x-text="src.name"></span>
                                            <span class="ml-2 text-xs px-1.5 py-0.5 rounded-full"
                                                  :class="{
                                                      'bg-green-100 text-green-700': src.health === 'healthy',
                                                      'bg-yellow-100 text-yellow-700': src.health === 'degraded',
                                                      'bg-red-100 text-red-700': src.health === 'failing' || src.health === 'dead',
                                                      'bg-gray-100 text-gray-500': src.health === 'new'
                                                  }" x-text="src.health"></span>
                                            <span x-show="src.gold_count > 0" class="ml-1 text-xs text-amber-600">⭐ <span x-text="src.gold_count"></span></span>
                                        </div>
                                        <div class="text-xs text-gray-400 flex items-center gap-2">
                                            <span x-text="src.type"></span>
                                            <span>P<span x-text="src.priority"></span></span>
                                            <span x-text="src.frequency"></span>
                                            <span x-show="src.leads > 0" class="text-emerald-600" x-text="src.leads + ' leads'"></span>
                                        </div>
                                    </div>
                                </label>
                            </template>
                        </div>
                    </div>

                    <!-- Smart mode: Show what's due -->
                    <div class="flex-1 overflow-y-auto px-6 py-3" x-show="scrapeMode === 'smart'" style="max-height: 400px;">
                        <template x-if="dueSources.length === 0">
                            <div class="text-center py-8 text-gray-400">
                                <div class="text-4xl mb-2">✨</div>
                                <div class="text-sm font-medium">All sources are up to date!</div>
                                <div class="text-xs mt-1">No sources are due for scraping right now</div>
                            </div>
                        </template>
                        <div class="space-y-1">
                            <template x-for="item in dueSources" :key="item.id">
                                <div class="flex items-center p-2 rounded-lg bg-blue-50">
                                    <div class="w-2 h-2 rounded-full bg-blue-500 mr-3"></div>
                                    <div class="flex-1 min-w-0">
                                        <div class="text-sm font-medium text-gray-700 truncate" x-text="item.name"></div>
                                        <div class="text-xs text-gray-400" x-text="item.reason"></div>
                                    </div>
                                    <span x-show="item.gold_count > 0" class="text-xs text-amber-600 mr-2">⭐ <span x-text="item.gold_count"></span> gold</span>
                                    <span class="text-xs px-2 py-0.5 rounded-full"
                                          :class="item.mode === 'gold' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'"
                                          x-text="item.mode === 'gold' ? 'Fast' : 'Discovery'"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Full sweep info -->
                    <div class="px-6 py-3" x-show="scrapeMode === 'full'">
                        <div class="bg-amber-50 border border-amber-200 rounded-lg p-4">
                            <div class="flex items-start">
                                <span class="text-xl mr-3">⚠️</span>
                                <div>
                                    <div class="text-sm font-medium text-amber-800">Full sweep will scrape all <span x-text="allSources.length"></span> active sources</div>
                                    <div class="text-xs text-amber-600 mt-1">This may take 30-90 minutes depending on content volume. Uses gold URLs where available for speed.</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- NEW: URL Extract mode -->
                    <div class="flex-1 px-6 py-4" x-show="scrapeMode === 'url'">
                        <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-5">
                            <div class="flex items-start mb-4">
                                <div class="w-10 h-10 rounded-lg bg-emerald-100 flex items-center justify-center mr-3 flex-shrink-0">
                                    <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                                    </svg>
                                </div>
                                <div>
                                    <div class="text-sm font-bold text-emerald-800">Paste any article URL to extract leads</div>
                                    <div class="text-xs text-emerald-600 mt-1">Works with hotel opening articles, listicles, press releases — any page mentioning new hotel openings</div>
                                </div>
                            </div>
                            <div class="relative">
                                <input type="url" 
                                       x-model="extractUrl"
                                       @keydown.enter="startScrape()"
                                       placeholder="https://"
                                       class="w-full px-4 py-3 pr-10 text-sm border-2 border-emerald-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 bg-white placeholder-gray-400">
                                <div class="absolute right-3 top-1/2 -translate-y-1/2">
                                    <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="mt-3 flex flex-wrap gap-2">
                                <span class="text-xs text-emerald-600 font-medium">Try:</span>
                                <button @click="extractUrl = 'https://www.hoteldive.com/news/top-hotel-openings-2026/810298/'" 
                                        class="text-xs px-2 py-1 bg-white border border-emerald-200 rounded-md text-emerald-700 hover:bg-emerald-100 transition-colors cursor-pointer">
                                    Hotel Dive 2026
                                </button>
                                <button @click="extractUrl = 'https://opulist.co/blog/the-most-beautiful-new-hotels-opening-in-the-us-in-2026'" 
                                        class="text-xs px-2 py-1 bg-white border border-emerald-200 rounded-md text-emerald-700 hover:bg-emerald-100 transition-colors cursor-pointer">
                                    Opulist US 2026
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex justify-between items-center">
                        <div class="text-xs text-gray-400">
                            <template x-if="scrapeMode === 'smart'"><span x-text="dueSources.length + ' sources will be scraped'"></span></template>
                            <template x-if="scrapeMode === 'manual'"><span x-text="selectedSources.length + ' sources selected'"></span></template>
                            <template x-if="scrapeMode === 'full'"><span x-text="allSources.length + ' sources (full sweep)'"></span></template>
                            <template x-if="scrapeMode === 'url'"><span x-text="extractUrl ? 'Ready to extract from URL' : 'Paste a URL above'"></span></template>
                        </div>
                        <div class="flex gap-2">
                            <button @click="closeModal()" class="px-4 py-2 text-sm text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</button>
                            <button @click="startScrape()"
                                    class="px-6 py-2 text-sm font-medium text-white rounded-lg hover:opacity-90 disabled:opacity-50 transition-all"
                                    :class="scrapeMode === 'url' ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-blue-600 hover:bg-blue-700'"
                                    :disabled="(scrapeMode === 'manual' && selectedSources.length === 0) || (scrapeMode === 'url' && !extractUrl.trim())">
                                <span x-show="scrapeMode !== 'url'">🚀 Start Pipeline</span>
                                <span x-show="scrapeMode === 'url'">🔗 Extract Leads</span>
                            </button>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ============ PROGRESS VIEW ============ -->
            <template x-if="view === 'progress'">
                <div class="flex flex-col max-h-[90vh]">
                    <!-- Header -->
                    <div class="px-6 py-4 border-b border-gray-200 flex-shrink-0"
                         :class="phase === 'complete' ? 'bg-emerald-50' : phase === 'error' ? 'bg-red-50' : 'bg-blue-50'">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <template x-if="phase === 'complete'">
                                    <div class="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center mr-3">
                                        <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                                    </div>
                                </template>
                                <template x-if="phase === 'error'">
                                    <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center mr-3">
                                        <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                    </div>
                                </template>
                                <template x-if="phase !== 'complete' && phase !== 'error'">
                                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center mr-3">
                                        <svg class="animate-spin w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                    </div>
                                </template>
                                <div>
                                    <h3 class="text-lg font-bold text-gray-900" x-text="title"></h3>
                                    <p class="text-sm text-gray-500" x-text="subtitle"></p>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-mono text-gray-500" x-text="formatTime(elapsed)"></span>
                                <button @click="closeModal()" class="text-gray-400 hover:text-gray-600 p-1">
                                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Phase Steps -->
                    <div class="px-6 py-3 bg-gray-50 border-b border-gray-100 flex-shrink-0">
                        <div class="flex items-center justify-between text-xs">
                            <template x-for="(p, i) in phases" :key="i">
                                <div class="flex items-center" :class="i < phases.length - 1 ? 'flex-1' : ''">
                                    <div class="flex items-center">
                                        <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold"
                                             :class="phaseIndex > i ? 'bg-emerald-500 text-white' : phaseIndex === i ? 'bg-blue-600 text-white ring-2 ring-blue-200' : 'bg-gray-200 text-gray-500'">
                                            <template x-if="phaseIndex > i"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg></template>
                                            <span x-show="phaseIndex <= i" x-text="i + 1"></span>
                                        </div>
                                        <span class="ml-1.5 font-medium" :class="phaseIndex >= i ? 'text-gray-900' : 'text-gray-400'" x-text="p"></span>
                                    </div>
                                    <div x-show="i < phases.length - 1" class="flex-1 h-0.5 mx-3" :class="phaseIndex > i ? 'bg-emerald-400' : 'bg-gray-200'"></div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Stats Cards -->
                    <div class="px-6 py-3 grid grid-cols-4 gap-3 flex-shrink-0">
                        <div class="bg-gray-50 rounded-lg p-3 text-center">
                            <div class="text-2xl font-bold text-gray-900" x-text="stats.sources"></div>
                            <div class="text-xs text-gray-500">Sources</div>
                        </div>
                        <div class="bg-gray-50 rounded-lg p-3 text-center">
                            <div class="text-2xl font-bold text-blue-600" x-text="stats.pages"></div>
                            <div class="text-xs text-gray-500">Pages</div>
                        </div>
                        <div class="bg-gray-50 rounded-lg p-3 text-center">
                            <div class="text-2xl font-bold text-amber-600" x-text="stats.extracted"></div>
                            <div class="text-xs text-gray-500">Extracted</div>
                        </div>
                        <div class="bg-emerald-50 rounded-lg p-3 text-center">
                            <div class="text-2xl font-bold text-emerald-600" x-text="stats.saved"></div>
                            <div class="text-xs text-gray-500">New Leads</div>
                        </div>
                    </div>

                    <!-- Sources Progress + Live Feed side by side -->
                    <div class="flex-1 overflow-hidden px-6 py-2 flex gap-4" style="max-height: 300px;">
                        <!-- Sources List -->
                        <div class="w-1/3 flex flex-col" x-show="sourcesProgress.length > 0">
                            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Sources</span>
                            <div class="flex-1 overflow-y-auto space-y-1">
                                <template x-for="src in sourcesProgress" :key="src.name">
                                    <div class="flex items-center text-sm py-1">
                                        <template x-if="src.status === 'done'">
                                            <svg class="w-4 h-4 text-emerald-500 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                                        </template>
                                        <template x-if="src.status === 'active'">
                                            <span class="w-4 h-4 mr-2 flex-shrink-0 flex items-center justify-center"><span class="w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse"></span></span>
                                        </template>
                                        <template x-if="src.status === 'error'">
                                            <svg class="w-4 h-4 text-red-400 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01"/></svg>
                                        </template>
                                        <span class="flex-1 truncate text-xs" :class="src.status === 'active' ? 'text-blue-700 font-medium' : 'text-gray-600'" x-text="src.name"></span>
                                        <span class="text-xs text-gray-400 ml-1" x-show="src.pages > 0" x-text="src.pages + 'p'"></span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Live Feed -->
                        <div class="flex-1 flex flex-col">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Live Feed</span>
                                <span class="text-xs text-gray-400" x-text="events.length + ' events'"></span>
                            </div>
                            <div id="scrape-feed" class="flex-1 bg-gray-900 rounded-lg p-3 overflow-y-auto font-mono text-xs space-y-0.5">
                                <template x-for="(evt, i) in events" :key="i">
                                    <div class="flex">
                                        <span class="text-gray-500 mr-2 flex-shrink-0" x-text="evt.time"></span>
                                        <span :class="{
                                            'text-emerald-400': evt.type === 'success',
                                            'text-blue-400': evt.type === 'info',
                                            'text-amber-400': evt.type === 'warn',
                                            'text-red-400': evt.type === 'error',
                                            'text-purple-400': evt.type === 'lead',
                                            'text-cyan-400': evt.type === 'phase',
                                            'text-gray-400': evt.type === 'debug'
                                        }" x-text="evt.msg"></span>
                                    </div>
                                </template>
                                <template x-if="events.length === 0">
                                    <div class="text-gray-500">Waiting for events...</div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex justify-between items-center flex-shrink-0">
                        <template x-if="phase !== 'complete' && phase !== 'error'">
                            <p class="text-xs text-gray-400">Scrape continues in background if you close</p>
                        </template>
                        <template x-if="phase === 'complete'">
                            <p class="text-sm text-emerald-600 font-medium">✨ Pipeline finished successfully!</p>
                        </template>
                        <template x-if="phase === 'error'">
                            <p class="text-sm text-red-500" x-text="errorMsg"></p>
                        </template>
                        <div class="flex gap-2">
                            <button x-show="phase !== 'complete' && phase !== 'error'"
                                    @click="closeModal()"
                                    class="px-4 py-2 text-sm text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                                Run in Background
                            </button>
                            <button x-show="phase === 'complete' || phase === 'error'"
                                    @click="closeModal(); window.location.reload()"
                                    class="px-4 py-2 text-sm font-medium text-white rounded-lg"
                                    :class="phase === 'complete' ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-gray-600 hover:bg-gray-700'">
                                Close & Refresh
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
function scrapeController() {
    return {
        // Views: setup | progress
        view: 'setup',
        scrapeMode: 'smart',  // smart | manual | full | url
        
        // Source data
        allSources: [],
        dueSources: [],
        selectedSources: [],
        categories: [],
        
        // URL Extract
        extractUrl: '',
        
        // Progress state
        phase: 'scraping',
        phaseIndex: 0,
        phases: ['Scraping', 'Extraction', 'Dedup', 'Complete'],
        title: 'Pipeline Running',
        subtitle: '',
        elapsed: 0,
        timer: null,
        errorMsg: '',
        eventSource: null,
        _retryCount: 0,
        _maxRetries: 5,
        _closed: false,
        
        stats: { sources: 0, pages: 0, extracted: 0, saved: 0 },
        sourcesProgress: [],
        events: [],

        formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
        },

        log(type, msg) {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            this.events.push({ time, type, msg });
            this.$nextTick(() => {
                const feed = document.getElementById('scrape-feed');
                if (feed) feed.scrollTop = feed.scrollHeight;
            });
        },

        async openModal() {
            document.getElementById('scrape-modal').classList.remove('hidden');
            this.view = 'setup';
            this.scrapeMode = 'smart';
            this.selectedSources = [];
            this.extractUrl = '';
            await this.loadSources();
        },

        // Open directly in URL mode (from quick-extract bar)
        openUrlExtract(detail) {
            document.getElementById('scrape-modal').classList.remove('hidden');
            this.view = 'setup';
            this.scrapeMode = 'url';
            this.extractUrl = (detail && detail.url) ? detail.url : '';
            this.selectedSources = [];
        },

        async loadSources() {
            try {
                const resp = await fetch('/api/dashboard/sources/list');
                if (resp.ok) {
                    const data = await resp.json();
                    this.allSources = data.sources || [];
                    this.dueSources = data.due_sources || [];
                    this.categories = data.categories || [];
                }
            } catch (e) {
                console.error('Failed to load sources:', e);
            }
        },

        toggleSource(id) {
            const idx = this.selectedSources.indexOf(id);
            if (idx >= 0) this.selectedSources.splice(idx, 1);
            else this.selectedSources.push(id);
        },

        toggleCategory(type) {
            const catSources = this.allSources.filter(s => s.type === type).map(s => s.id);
            const allSelected = catSources.every(id => this.selectedSources.includes(id));
            if (allSelected) {
                this.selectedSources = this.selectedSources.filter(id => !catSources.includes(id));
            } else {
                catSources.forEach(id => {
                    if (!this.selectedSources.includes(id)) this.selectedSources.push(id);
                });
            }
        },

        isCategorySelected(type) {
            const catSources = this.allSources.filter(s => s.type === type).map(s => s.id);
            return catSources.length > 0 && catSources.every(id => this.selectedSources.includes(id));
        },

        startScrape() {
            // Switch to progress view
            this.view = 'progress';
            this.phase = 'scraping';
            this.phaseIndex = 0;
            this.title = this.scrapeMode === 'url' ? 'Extracting from URL' : 'Pipeline Running';
            this.subtitle = 'Initializing...';
            this.elapsed = 0;
            this.stats = { sources: 0, pages: 0, extracted: 0, saved: 0 };
            this.sourcesProgress = [];
            this.events = [];
            this.errorMsg = '';
            this._retryCount = 0;
            this._closed = false;

            if (this.scrapeMode === 'url') {
                this.log('info', `Extracting leads from: ${this.extractUrl}`);
            } else {
                this.log('info', `Starting pipeline (${this.scrapeMode} mode)...`);
            }
            this.timer = setInterval(() => this.elapsed++, 1000);

            if (this.scrapeMode === 'url') {
                this.triggerUrlExtract();
            } else {
                this.triggerScrape();
            }
        },

        // NEW: Trigger URL extraction
        async triggerUrlExtract() {
            try {
                const resp = await fetch('/api/dashboard/extract-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: this.extractUrl })
                });
                const data = await resp.json();
                
                if (resp.ok && data.status !== 'error') {
                    this.log('success', 'URL extract started');
                    this.connectSSE('/api/dashboard/extract-url/stream?extract_id=' + data.extract_id);
                } else {
                    this.handleError(data.message || 'Failed to start URL extract');
                }
            } catch (e) {
                this.handleError('Connection error: ' + e.message);
            }
        },

        async triggerScrape() {
            try {
                let sourceIds = [];
                if (this.scrapeMode === 'manual') {
                    sourceIds = this.selectedSources;
                } else if (this.scrapeMode === 'smart') {
                    sourceIds = this.dueSources.map(s => s.id);
                }

                const resp = await fetch('/api/dashboard/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mode: this.scrapeMode,
                        source_ids: sourceIds
                    })
                });
                const data = await resp.json();
                
                if (resp.ok) {
                    this.log('success', `Scrape queued (${this.scrapeMode} mode)`);
                    this.connectSSE('/api/dashboard/scrape/stream?scrape_id=' + data.scrape_id);
                } else {
                    this.handleError(data.detail || 'Failed to start');
                }
            } catch (e) {
                this.handleError('Connection error: ' + e.message);
            }
        },

        // Updated: accepts URL parameter for different SSE endpoints
        connectSSE(url) {
            this._closed = false;
            this._sseUrl = url || '/api/dashboard/scrape/stream';
            this._createSSE();
        },

        _createSSE() {
            if (this.eventSource) { this.eventSource.close(); this.eventSource = null; }
            try {
                const es = new EventSource(this._sseUrl || '/api/dashboard/scrape/stream');
                es.onopen = () => { this._retryCount = 0; };
                es.onmessage = (e) => {
                    try { this.handleEvent(JSON.parse(e.data)); }
                    catch (err) { this.log('debug', e.data); }
                };
                es.onerror = () => {
                    es.close(); this.eventSource = null;
                    if (this._closed || this.phase === 'complete' || this.phase === 'error') return;
                    this._retryCount++;
                    if (this._retryCount > this._maxRetries) {
                        if (this.elapsed > 5) {
                            this.phase = 'complete'; this.phaseIndex = 3;
                            this.title = 'Pipeline Complete'; this.subtitle = 'Stream ended';
                            clearInterval(this.timer);
                            this.log('success', 'Pipeline finished');
                        }
                        return;
                    }
                    const delay = Math.min(1000 * Math.pow(2, this._retryCount - 1), 16000);
                    setTimeout(() => {
                        if (this.phase !== 'complete' && this.phase !== 'error' && !this._closed) this._createSSE();
                    }, delay);
                };
                this.eventSource = es;
            } catch (e) { this.log('error', 'SSE unavailable'); }
        },

        handleEvent(data) {
            switch (data.type) {
                case 'started':
                    this.log('info', 'Pipeline initialized');
                    break;
                case 'info':
                    this.subtitle = data.message;
                    if (data.message.includes('Phase 2') || data.message.includes('AI extraction')) {
                        this.phase = 'extraction'; this.phaseIndex = 1;
                        this.title = 'AI Extraction';
                        this.log('phase', '━━ Phase 2: AI Extraction (Gemini) ━━');
                    } else if (data.message.includes('Phase 3') || data.message.includes('Dedup')) {
                        this.phase = 'dedup'; this.phaseIndex = 2;
                        this.title = 'Deduplication';
                        this.log('phase', '━━ Phase 3: Deduplication ━━');
                    } else if (data.message.includes('Extracted')) {
                        const m = data.message.match(/Extracted (\d+)/);
                        if (m) this.stats.extracted = parseInt(m[1]);
                        this.log('info', data.message);
                    } else if (data.message.includes('Saved')) {
                        const m = data.message.match(/Saved (\d+)/);
                        if (m) this.stats.saved = parseInt(m[1]);
                        this.log('success', data.message);
                    } else {
                        this.log('info', data.message);
                    }
                    break;
                case 'source_start':
                    if (!this.sourcesProgress.find(s => s.name === data.source)) {
                        this.sourcesProgress.push({ name: data.source, status: 'active', pages: 0 });
                    }
                    this.subtitle = `Scraping ${data.source} (${data.current}/${data.total})`;
                    this.log('info', `▸ Scraping ${data.source} [${data.current}/${data.total}]`);
                    break;
                case 'source_complete':
                    const src = this.sourcesProgress.find(s => s.name === data.source);
                    if (src) { src.status = 'done'; src.pages = data.pages || 0; }
                    this.stats.sources++;
                    this.stats.pages += (data.pages || 0);
                    this.log('success', `✓ ${data.source}: ${data.pages || 0} pages`);
                    break;
                case 'url_error':
                    const errSrc = this.sourcesProgress.find(s => s.status === 'active');
                    if (errSrc) errSrc.status = 'error';
                    this.log('warn', `⚠ ${data.url}: ${data.error}`);
                    break;
                case 'leads_found':
                    this.stats.saved = data.total_saved || data.saved || this.stats.saved;
                    this.log('lead', `★ ${data.saved || 0} new leads saved (${data.total_saved || 0} total)`);
                    break;
                case 'complete':
                case 'finished':
                    clearInterval(this.timer);
                    this.phase = 'complete'; this.phaseIndex = 3;
                    this.title = 'Pipeline Complete!';
                    const s = data.stats || data;
                    this.stats.sources = s.sources_scraped || this.stats.sources;
                    this.stats.pages = s.urls_scraped || this.stats.pages;
                    this.stats.extracted = s.leads_found || this.stats.extracted;
                    this.stats.saved = s.leads_saved || this.stats.saved;
                    const dur = data.duration_seconds ? Math.round(data.duration_seconds) : this.elapsed;
                    this.subtitle = `Completed in ${this.formatTime(dur)}`;
                    this.log('success', `━━ COMPLETE: ${this.stats.saved} new leads from ${this.stats.extracted} extracted ━━`);
                    this._closeSSE();
                    break;
                case 'error':
                    this.handleError(data.message || 'Unknown error');
                    this._closeSSE();
                    break;
                case 'cancelled':
                    this.handleError('Scrape cancelled');
                    this._closeSSE();
                    break;
            }
        },

        handleError(msg) {
            clearInterval(this.timer);
            this.phase = 'error';
            this.title = 'Pipeline Error';
            this.subtitle = msg;
            this.errorMsg = msg;
            this.log('error', `✗ ${msg}`);
        },

        _closeSSE() {
            this._closed = true;
            if (this.eventSource) { this.eventSource.close(); this.eventSource = null; }
        },

        closeModal() {
            document.getElementById('scrape-modal').classList.add('hidden');
            this._closeSSE();
            clearInterval(this.timer);
        }
    }
}
</script>
